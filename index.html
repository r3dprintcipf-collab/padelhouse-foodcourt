<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel House - Food Court</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fcfbfa;
            color: #333;
            text-align: center;
        }
        .banner-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 10px;
            box-sizing: border-box;
        }
        .banner-container img {
            width: 100%;
            max-height: 300px; /* Limite la hauteur pour un effet bandeau propre */
            object-fit: contain; /* Empêche la déformation de l'image */
            margin-top: 10px;
        }
        h1 {
            color: #4a5d37; /* Couleur verte du logo */
            margin-top: 30px;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <!-- Bannière Padel House Food Court -->
        <img src="images/banniere.png" alt="Padel House Food Court">
    </div>

    <h1>Découvrez nos 7 Restaurants</h1>
    <p>Sélectionnez un restaurant pour ouvrir son menu PDF.</p>

</body>
</html>
